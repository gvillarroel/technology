evaluations:
  - id: openai-playwright-compare
    skill:
      repository_slug: openai-curated-skills
      slug: playwright
    benchmark:
      id: playwright-interactive-compare
      description: Compare browser task execution with and without the Playwright skill on UI regression prompts.
      tags:
        - compare
        - playwright
        - ui
    task:
      prompts:
        - id: login-happy-path
          description: Validate login flow against a seeded fixture app.
        - id: trace-cart-checkout
          description: Trace checkout failure and report the blocking selector.
        - id: capture-accessibility-proof
          description: Produce evidence for the main navigation accessibility state.
    workspace:
      sources:
        - type: local-path
          target: /
          path: evaluations/playwright-interactive/fixtures/workspaces/base
      initialize_git: true
      skill_source:
        type: git
        repo: https://github.com/openai/skills.git
        skill_path: skills/.curated/playwright
      install_strategy: workspace-overlay
    evaluation:
      assertions:
        - javascript
        - llm-rubric
      requests: 10
      timeout_ms: 180000
      max_concurrency: 4
      no_cache: true
      tracing: false
    comparison:
      profiles:
        - id: no-skill
          description: Fully isolated control without the Playwright skill.
        - id: skill
          description: Profile with only the Playwright skill enabled.
      variants:
        - id: codex-mini
          adapter: codex
          model: gpt-5.1-codex-mini
          variant_display_name: codex mini
        - id: pi-gpt5mini
          adapter: pi
          model: github-copilot/gpt-5-mini
          variant_display_name: pi gpt-5 mini
    results:
      started_at: 2026-04-03T09:10:00Z
      completed_at: 2026-04-03T09:37:00Z
      pass_count: 46
      total_runs: 60
      cells:
        - prompt_id: login-happy-path
          profile_id: no-skill
          variant_id: codex-mini
          variant_display_name: codex mini
          completed_runs: 10
          pass_count: 6
        - prompt_id: login-happy-path
          profile_id: skill
          variant_id: codex-mini
          variant_display_name: codex mini
          completed_runs: 10
          pass_count: 9
        - prompt_id: trace-cart-checkout
          profile_id: no-skill
          variant_id: codex-mini
          variant_display_name: codex mini
          completed_runs: 10
          pass_count: 5
        - prompt_id: trace-cart-checkout
          profile_id: skill
          variant_id: codex-mini
          variant_display_name: codex mini
          completed_runs: 10
          pass_count: 8
        - prompt_id: capture-accessibility-proof
          profile_id: no-skill
          variant_id: pi-gpt5mini
          variant_display_name: pi gpt-5 mini
          completed_runs: 10
          pass_count: 8
        - prompt_id: capture-accessibility-proof
          profile_id: skill
          variant_id: pi-gpt5mini
          variant_display_name: pi gpt-5 mini
          completed_runs: 10
          pass_count: 10

