  - id: openai-docs-retrieval-compare
    skill:
      repository_slug: openai-system-skills
      slug: openai-docs
    benchmark:
      id: openai-docs-retrieval
      description: Verify retrieval of current official guidance using the OpenAI docs system skill.
      tags:
        - compare
        - docs
        - retrieval
    task:
      prompts:
        - id: latest-model-guidance
          description: Retrieve current official model guidance for a coding use case.
        - id: api-upgrade-path
          description: Summarize the recommended upgrade path to the current API interface.
    workspace:
      sources:
        - type: empty
          target: /
      initialize_git: false
      skill_source:
        type: system-installed
        repo: https://github.com/openai/skills.git
        skill_path: skills/.system/openai-docs
      install_strategy: system-installed
    evaluation:
      assertions:
        - llm-rubric
      requests: 5
      timeout_ms: 120000
      max_concurrency: 2
      no_cache: true
      tracing: false
    comparison:
