repositories:
  - slug: openai-curated-skills
    name: OpenAI Curated Skills
    source: github
    location: C:/Users/villa/.codex/vendor_imports/skills/skills/.curated
    repository: openai/skills
    ref: main
    skill_root: skills/.curated
    allowed: true
    purpose: Curated Codex skills approved for explicit installation from the OpenAI skills catalog
    install_snippet_template: npx skills add {repository}@{slug}

  - slug: openai-system-skills
    name: OpenAI System Skills
    source: github
    location: C:/Users/villa/.codex/skills/.system
    repository: openai/skills
    ref: main
    skill_root: skills/.system
    allowed: true
    purpose: Built-in Codex system skills approved as reference capabilities from the OpenAI catalog
    install_snippet_template: |
      # Included with recent Codex releases
      # Source: {skillUrl}

  - slug: anthropic-skills
    name: Anthropic Skills
    source: github
    repository: anthropics/skills
    ref: main
    skill_root: skills
    allowed: true
    purpose: Approved external reference skills from Anthropic's public Agent Skills repository
    install_snippet_template: |
      /plugin marketplace add anthropics/skills
      # Skill source: {skillUrl}

  - slug: agent-marketplace
    name: Agent Marketplace
    source: local
    location: C:/Users/villa/.agents/skills
    allowed: true
    purpose: Shared local skills used across agent workflows

  - slug: knowledge-skills
    name: Knowledge Skills
    source: github
    location: C:/Users/villa/dev/knowledge/skills
    repository: gvillarroel/knowledge
    ref: main
    skill_root: skills
    allowed: true
    purpose: Repository-backed skills focused on knowledge ingestion and retrieval workflows
    install_snippet_template: npx skills add {repository}@{slug}
