  - slug: metrics
    name: Metrics
    status: Active
    owner: Observability
    summary: Track organizational adoption, usage, output, cost, and quality signals with a clear split between repository evidence, product telemetry, and vendor admin APIs.
    outcome: Teams can explain where AI usage is growing, what it is costing, which workflows produce accepted output, and where governance or quality still lag.
    signals:
      - Repository-level AI conventions are visible by owner, path, and first adoption date.
      - Tool usage, token spend, and accepted output can be reviewed by platform instead of inferred from anecdotes.
      - Governance coverage is separated from runtime usage so adoption does not get overstated.
      - Quality and spend regressions are reviewed with the model, tool, and workflow that produced them.
    practices:
      - Separate governance coverage, developer usage, generated output, and runtime quality into different views.
      - Prefer metrics that can be pulled from existing systems of record instead of survey-only proxies.
      - Keep provider-specific signals visible by tool because Copilot, Claude Code, and OpenAI expose different slices of the workflow.
      - Treat cost per active user and cost per accepted output as more decision-useful than raw spend alone.
      - Do not present vendor usage growth as productivity gain without accepted-output or quality context.
    metrics:
      - AI workflow coverage by repository, owner, and document convention
      - Weekly active AI users and sessions by platform
      - Accepted AI-generated lines, edits, commits, or pull requests by platform
      - Spend per active user, per session, and per accepted output unit
      - Token usage and cost by model, project, API key, or service tier
      - AI document adoption slope, linked-document density, and first-seen rollout timeline
      - Evaluation regression rate, safety intervention rate, and fallback rate
      - P95 task latency only for product workflows with runtime inference telemetry
    measurement_layers:
      - title: Governance and repository readiness
        summary: Use repository evidence to show where AI operating conventions exist before claiming broad organizational adoption.
        signals:
          - Repository coverage for AGENTS.md, CLAUDE.md, SKILL.md, skills.md, copilot-instructions.md, and related AI markdown entrypoints.
          - Adoption by owner, business unit, or repository set.
          - First-seen adoption timeline and AI-doc commit history.
          - Linked-document structure that shows whether entrypoints point to specs, skills, or supporting docs.
        chart: Cumulative adoption line plus stacked horizontal bar by owner and convention.
        source_hint: Pulse report data, repository snapshots, AI-doc occurrences, AI-doc links, and weekly AI-doc commit history.
      - title: Usage and reach
        summary: Measure who is actually using each assistant platform and how consistently they return.
        signals:
          - Weekly active users, monthly active users, and active seats by platform.
          - Sessions, chats, or coding sessions per active user.
          - Usage split by team, organization, or owner when the vendor exposes it.
          - Top languages, editors, terminal types, or feature modes when available.
        chart: Multi-series line for active users over time and grouped bar for usage mix by platform.
        source_hint: GitHub Copilot usage metrics, Claude Code analytics, and OpenAI usage buckets grouped by user, project, or API key.
      - title: Output and accepted change
        summary: Focus on accepted or merged output instead of total generated text when comparing assistants.
        signals:
          - Accepted suggestion rate or acceptance count for generated code.
          - Accepted lines, edited lines, added lines, deleted lines, or generated code volume.
          - Commits or pull requests attributed to AI agents or assistant-driven workflows.
          - Repository paths or teams receiving the highest AI-assisted change volume.
        chart: Grouped bar for accepted output by platform and scatter plot of cost versus accepted output.
        source_hint: Copilot lines-of-code metrics, Claude Code analytics, and repository commit or PR evidence where the workflow leaves provenance.
      - title: Cost and efficiency
        summary: Track spend in the same view as reach and accepted output so efficiency decisions are visible.
        signals:
          - Total spend and spend trend by provider.
          - Cost by model, API key, project, or service tier.
          - Cost per active user, cost per session, and cost per accepted output unit.
          - Token mix across input, cached input, output, and tool-call-heavy workflows.
        chart: Area or line chart for spend trend and bubble chart for spend versus accepted output by team or provider.
        source_hint: Anthropic Usage and Cost API, OpenAI organization usage and costs endpoints, and vendor billing dashboards.
      - title: Runtime quality and control
        summary: Keep production quality signals separate from documentation and developer adoption signals.
        signals:
          - Offline evaluation regression rate after prompt or model changes.
          - Safety intervention rate, fallback rate, and incident counts tied to model or tool versions.
          - P95 task latency and failure rate for user-facing AI features.
          - Review backlog for suspicious spend, drift, or policy violations.
        chart: Control chart or line chart for regression and safety events, with a separate latency trend for production workloads.
        source_hint: Product telemetry, evaluation pipelines, incident tooling, and production observability rather than repository scans.
    data_sources:
      - name: Pulse
        scope: Organization-wide repository evidence and AI-document adoption across GitHub repositories.
        availability: Available now from repository fetches, snapshots, file paths, markdown links, and weekly Git history.
        metrics:
          - Repository count with AI entrypoint docs by owner or repository group.
          - AI-doc adoption percentage and first-seen adoption timeline.
          - Linked markdown structures such as AGENTS.md to specs or skills documentation.
          - Weekly commit history touching AI-related documentation.
        caveats:
          - Strong for workflow readiness and governance coverage, not for runtime AI usage.
          - Does not prove an assistant was actively used in the code path.
      - name: GitHub Copilot
        scope: Enterprise and organization usage, adoption, and code-generation activity for Copilot features.
        availability: Exposed through the Copilot usage metrics dashboard and APIs at enterprise, organization, and user levels.
        metrics:
          - 28-day usage and adoption trends.
          - Active users and feature usage across chat, completions, and agent features.
          - Lines-of-code metrics for suggested, added, or deleted lines.
          - Metrics segmented at enterprise, organization, and user level.
        caveats:
          - Best for Copilot-native workflows, not for non-Copilot assistants.
          - Productivity interpretation still needs accepted-output and quality context.
      - name: Claude Code and Anthropic admin APIs
        scope: Claude Code adoption, productivity activity, and organization cost tracking.
        availability: Claude Code workspace cost controls plus Anthropic Administration APIs for Usage and Cost and Claude Code Analytics.
        metrics:
          - Centralized Claude Code cost tracking and spend limits at organization level.
          - Historical API usage and cost data for the organization.
          - Claude Code adoption and developer productivity signals from the analytics API.
          - Commits, pull requests, lines changed, terminal type, or actor-level analytics where exposed by the Claude Code analytics surface.
        caveats:
          - Analytics are Anthropic-specific and should be shown separately from repository evidence.
          - Field availability can differ between Claude Code auth flows and general API traffic.
      - name: OpenAI usage and costs APIs for Codex and API workloads
        scope: Organization API usage, cost, and model-level breakdowns for OpenAI-hosted workloads.
        availability: OpenAI organization usage endpoints, usage dashboard, and costs endpoint.
        metrics:
          - Tokens and requests grouped by model, project, user, or API key where the endpoint supports grouping.
          - Cost reconciliation from the Costs endpoint and usage dashboard.
          - Spend split by model family, service tier, and tool-call-heavy workloads.
          - Codex model usage and cost trends when those workloads run through the OpenAI API.
        caveats:
          - Strong for API traffic and cost accounting, but not for repository governance coverage.
          - Accepted code change or merge-quality metrics need to be joined with repository or delivery data.
    links:
      - label: Observability context
        url: /communities/
      - label: Internal AI SDLC index
        url: /ai-sdlc/
  - slug: pulse
    name: Pulse
    status: Active
    owner: Observability
    summary: Review repository evidence from Pulse to understand AI-document coverage, repository size, weekly activity, language composition, and ingestion failures across the tracked portfolio.
    outcome: Teams can inspect repository-level AI readiness and maintenance signals from one operational page without mixing them with runtime product telemetry or vendor admin analytics.
    signals:
      - Repository-level AI entrypoints are visible as concrete file conventions instead of inferred process maturity.
      - Weekly commit volume can be compared against repository size and language composition on the same page.
      - Failed repository scans stay visible so coverage gaps are not mistaken for healthy absence.
      - Freshness metadata shows when the latest Pulse run and fetch completed.
    practices:
      - Treat Pulse as repository evidence for governance and maintenance posture, not as proof of assistant usage.
      - Keep convention coverage, repository scale, language share, and failure state in one comparable operational surface.
      - Normalize selected subsets only when the denominator is explicit to the user.
      - Keep failed repositories visible in the same review loop as successful snapshots.
    metrics:
      - Repositories with AI entrypoint conventions
      - Convention coverage by repository
      - Total files and lines across analyzed repositories
      - Weekly commits by repository
      - Language share by bytes
      - Failed repository count and failure detail
    links:
      - label: Internal AI SDLC index
        url: /ai-sdlc/
      - label: Observability context
        url: /communities/
