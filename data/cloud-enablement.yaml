providers:
  - slug: gcp
    name: Google Cloud
    short_name: GCP
    priority: primary
    summary: Google Cloud is the primary cloud enablement inventory and should receive the deepest feature coverage first.
    official_inventory_label: Google Cloud products at a glance
    official_inventory_url: https://docs.cloud.google.com/docs/product-list
    documentation_url: https://cloud.google.com/products
    coverage_status: Seeded from official product catalog and documentation hubs; feature coverage is still partial.
    updated: 2026-04-04
    known_limitations:
      - The full Google Cloud product catalog is larger than the seeded list below.
      - Known features are limited to features already confirmed from official product or documentation pages.
    products:
      - slug: vertex-ai
        name: Vertex AI
        archetype: Product
        category: AI and machine learning
        summary: Build, tune, evaluate, and deploy machine learning and generative AI applications on Google Cloud.
        product_url: https://cloud.google.com/vertex-ai
        feature_source_url: https://cloud.google.com/vertex-ai/docs
        feature_coverage: Partial
        known_features:
          - Gemini models on Vertex AI
          - Model Garden
          - Prompt management
          - Evaluation
          - Vector Search
          - Pipelines
      - slug: bigquery
        name: BigQuery
        archetype: Product
        category: Data analytics
        summary: Serverless enterprise data warehouse and analytics platform.
        product_url: https://cloud.google.com/bigquery
        feature_source_url: https://cloud.google.com/bigquery/docs
        iam_source_url: https://docs.cloud.google.com/bigquery/docs/access-control
        feature_coverage: Partial
        known_features:
          - SQL analytics
          - BigQuery ML
          - BigQuery Studio
          - Vector search
          - Data sharing
          - BigLake integration
        iam_permissions:
          - permission: bigquery.jobs.create
            included_in_roles:
              - roles/owner
              - roles/editor
              - roles/bigquery.admin
              - roles/bigquery.jobUser
              - roles/bigquery.user
              - roles/bigquery.studioAdmin
              - roles/bigquery.studioUser
            approved_company_roles:
              - approved-gcp-bigquery-job-runner
              - approved-gcp-data-platform-analyst
          - permission: bigquery.datasets.get
            included_in_roles:
              - roles/owner
              - roles/editor
              - roles/viewer
              - roles/bigquery.admin
              - roles/bigquery.dataEditor
              - roles/bigquery.dataOwner
              - roles/bigquery.dataViewer
              - roles/bigquery.user
            approved_company_roles: []
          - permission: bigquery.tables.get
            included_in_roles:
              - roles/owner
              - roles/editor
              - roles/viewer
              - roles/bigquery.admin
              - roles/bigquery.dataEditor
              - roles/bigquery.dataOwner
              - roles/bigquery.dataViewer
              - roles/bigquery.metadataViewer
            approved_company_roles:
              - approved-gcp-bigquery-metadata-reader
              - approved-gcp-data-platform-analyst
          - permission: bigquery.tables.getData
            included_in_roles:
              - roles/owner
              - roles/bigquery.admin
              - roles/bigquery.dataEditor
              - roles/bigquery.dataOwner
              - roles/bigquery.dataViewer
            approved_company_roles:
              - approved-gcp-bigquery-data-reader
              - approved-gcp-data-platform-analyst
          - permission: bigquery.tables.create
            included_in_roles:
              - roles/owner
              - roles/editor
              - roles/bigquery.admin
              - roles/bigquery.dataEditor
              - roles/bigquery.dataOwner
            approved_company_roles:
              - approved-gcp-bigquery-data-editor
              - approved-gcp-analytics-engineer
          - permission: bigquery.tables.updateData
            included_in_roles:
              - roles/owner
              - roles/editor
              - roles/bigquery.admin
              - roles/bigquery.dataEditor
              - roles/bigquery.dataOwner
            approved_company_roles:
              - approved-gcp-bigquery-data-editor
              - approved-gcp-analytics-engineer
          - permission: bigquery.routines.create
            included_in_roles:
              - roles/owner
              - roles/editor
              - roles/bigquery.admin
              - roles/bigquery.dataEditor
              - roles/bigquery.dataOwner
            approved_company_roles:
              - approved-gcp-bigquery-routine-editor
              - approved-gcp-analytics-engineer
          - permission: bigquery.models.create
            included_in_roles:
              - roles/owner
              - roles/editor
              - roles/bigquery.admin
              - roles/bigquery.dataEditor
              - roles/bigquery.dataOwner
            approved_company_roles:
              - approved-gcp-bigquery-ml-editor
              - approved-gcp-applied-ml-engineer
      - slug: compute-engine
        name: Compute Engine
        archetype: Infrastructure
        category: Compute
        summary: Virtual machines on Google Cloud with preset and custom machine types.
        product_url: https://cloud.google.com/compute
        feature_source_url: https://cloud.google.com/compute/docs
        feature_coverage: Partial
        known_features:
          - Custom machine types
          - Managed instance groups
          - Spot VMs
          - GPUs
          - Sole-tenant nodes
      - slug: cloud-run
        name: Cloud Run
        archetype: Product
        category: Application development
        summary: Fully managed environment for running stateless containers.
        product_url: https://cloud.google.com/run
        feature_source_url: https://cloud.google.com/run/docs
        feature_coverage: Partial
