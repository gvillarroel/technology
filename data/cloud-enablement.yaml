          - Read replicas
      - slug: pub-sub
        name: Pub/Sub
        archetype: Product
        category: Integration
        summary: Global messaging and event ingestion service for asynchronous systems.
        product_url: https://cloud.google.com/pubsub
        feature_source_url: https://cloud.google.com/pubsub/docs
        feature_coverage: Partial
        known_features:
