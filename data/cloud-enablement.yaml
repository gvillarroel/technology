          - Object versioning
          - Transfer Service integration
      - slug: cloud-sql
        name: Cloud SQL
        archetype: Product
        category: Databases
        summary: Fully managed relational databases for MySQL, PostgreSQL, and SQL Server.
        product_url: https://cloud.google.com/sql
        feature_source_url: https://cloud.google.com/sql/docs
        feature_coverage: Partial
