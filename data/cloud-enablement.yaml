      - slug: cloud-monitoring
        name: Cloud Monitoring
        archetype: Tool
        category: Observability
        summary: Metrics, dashboards, alerting, and uptime monitoring for Google Cloud and hybrid systems.
        product_url: https://cloud.google.com/products/observability
        feature_source_url: https://cloud.google.com/monitoring/docs
        feature_coverage: Partial
        known_features:
