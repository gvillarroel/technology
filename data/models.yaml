catalog:
  title: AI model families
  summary: Governed model-family inventory covering managed Vertex AI Model Garden access and approved local Ollama runtimes.
  updated: 2026-04-07
  statuses:
    approved: Approved for standard use with the listed controls.
    explore: Available for evaluation but not yet a default choice.
    blacklisted: Not approved for production use.
  sources:
    - slug: vertex-ai-model-garden
      name: Vertex AI Model Garden
      provider: Google Cloud
      delivery: Managed API
      source_url: https://docs.cloud.google.com/vertex-ai/generative-ai/docs/learn/locations
      pricing_url: https://cloud.google.com/vertex-ai/generative-ai/pricing
    - slug: ollama
      name: Ollama
      provider: Ollama
      delivery: Local runtime
      source_url: https://ollama.com/library
      pricing_url: https://ollama.com/library
  families:
    - slug: gemini
      family_name: Gemini
      source: vertex-ai-model-garden
      status: approved
      regions_available:
        - global
        - us-west1
        - us-west4
        - us-central1
        - us-east1
        - us-east4
        - us-east5
        - us-south1
      price: Gemini 2.5 Flash input starts at $0.54 and output at $4.50 per 1M tokens; Gemini 2.5 Pro input starts at $2.25 and output at $18 per 1M tokens.
      models:
        - Gemini 2.5 Pro
        - Gemini 2.5 Flash
        - Gemini 2.5 Flash-Lite
      notes:
        - Use when teams need Google-managed multimodal and reasoning models with broad US regional coverage.
        - Global endpoint is available but should not be used where residency requirements apply.
      source_urls:
        - https://docs.cloud.google.com/vertex-ai/generative-ai/docs/learn/locations
        - https://cloud.google.com/vertex-ai/generative-ai/pricing
